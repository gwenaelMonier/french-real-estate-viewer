<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carte interactive de la France</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: sans-serif;
      }
      #map {
        width: 100vw;
        height: 100vh;
        outline: none;
      }
      .leaflet-interactive:focus {
        outline: none;
      }
      .legend {
        background: white;
        padding: 10px 14px;
        border-radius: 6px;
        box-shadow: 0 1px 5px rgba(0, 0, 0, 0.3);
        line-height: 1.6;
        font-size: 13px;
      }
      .legend-gradient {
        width: 160px;
        height: 12px;
        background: linear-gradient(
          to right,
          hsl(120, 80%, 45%),
          hsl(60, 80%, 45%),
          hsl(0, 80%, 45%)
        );
        border-radius: 3px;
        margin: 6px 0 4px;
      }
      .legend-labels {
        display: flex;
        justify-content: space-between;
        font-size: 11px;
        color: #555;
      }
    </style>
  </head>
  <body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.vectorgrid@1.3.0/dist/Leaflet.VectorGrid.bundled.min.js"></script>
    <script src="communes.js"></script>
    <script>
      const map = L.map("map").setView([46.603354, 1.888334], 6);

      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        attribution:
          '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
        maxZoom: 19,
      }).addTo(map);

      // Échelle de couleur (percentiles P2/P98)
      const prices = COMMUNES.map((c) => c.avg_m2).sort((a, b) => a - b);
      const p2 = prices[Math.floor(prices.length * 0.02)];
      const p98 = prices[Math.floor(prices.length * 0.98)];

      function priceToColor(price) {
        const t = Math.max(0, Math.min(1, (price - p2) / (p98 - p2)));
        return `hsl(${Math.round(120 * (1 - t))}, 80%, 45%)`;
      }

      // Flag drag pour bloquer les tooltips pendant le déplacement
      let isDragging = false;
      function clearTooltip() {
        if (tooltip) {
          tooltip.remove();
          tooltip = null;
        }
      }

      map.on("dragstart", () => {
        isDragging = true;
        clearTooltip();
      });
      map.on("dragend", () => {
        isDragging = false;
      });
      map.on("zoomstart", () => {
        isDragging = true;
        clearTooltip();
      });
      map.on("zoomend", () => {
        isDragging = false;
      });

      // Index COMMUNES par code_commune
      const communeIndex = {};
      COMMUNES.forEach((c) => {
        communeIndex[c.code_commune] = c;
      });

      // Tooltip unique réutilisé
      let tooltip = null;

      // Polygones par commune via VectorGrid (tuiles canvas, seul le visible est rendu)
      fetch(
        "https://raw.githubusercontent.com/gregoiredavid/france-geojson/master/communes-version-simplifiee.geojson",
      )
        .then((r) => r.json())
        .then((geojson) => {
          const grid = L.vectorGrid
            .slicer(geojson, {
              rendererFactory: L.canvas.tile,
              vectorTileLayerStyles: {
                sliced(properties) {
                  const c = communeIndex[properties.code];
                  if (!c) {
                    return {
                      fill: false,
                      stroke: true,
                      color: "#aaa",
                      weight: 0.3,
                      opacity: 0.2,
                    };
                  }
                  return {
                    fill: true,
                    fillColor: priceToColor(c.avg_m2),
                    fillOpacity: 0.45,
                    stroke: true,
                    color: "#555",
                    weight: 0.4,
                    opacity: 0.3,
                  };
                },
              },
              interactive: true,
              getFeatureId: (f) => f.properties.code,
            })
            .addTo(map);

          grid.on("mouseover", (e) => {
            if (isDragging) return;
            const c = communeIndex[e.layer.properties.code];
            if (!c) return;
            tooltip = L.tooltip({ sticky: true })
              .setContent(
                `<b>${c.nom_commune}</b> (${c.code_dep})<br>` +
                  `${c.avg_m2.toLocaleString("fr-FR")} €/m²<br>` +
                  `<small>${c.nb} ventes</small>`,
              )
              .setLatLng(e.latlng)
              .addTo(map);
          });

          map.on("mousemove", (e) => {
            if (!tooltip) return;
            if (isDragging) clearTooltip();
            else tooltip.setLatLng(e.latlng);
          });

          grid.on("mouseout", clearTooltip);
        });

      // Légende
      const legend = L.control({ position: "bottomright" });
      legend.onAdd = function () {
        const div = L.DomUtil.create("div", "legend");
        div.innerHTML =
          "<b>Prix moyen au m²</b>" +
          '<div class="legend-gradient"></div>' +
          '<div class="legend-labels">' +
          `<span>${Math.round(p2).toLocaleString("fr-FR")} €</span>` +
          `<span>${Math.round((p2 + p98) / 2).toLocaleString("fr-FR")} €</span>` +
          `<span>${Math.round(p98).toLocaleString("fr-FR")} €</span>` +
          "</div>";
        return div;
      };
      legend.addTo(map);
    </script>
  </body>
</html>

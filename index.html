<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carte interactive de la France</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: sans-serif;
      }
      #map {
        width: 100vw;
        height: 100vh;
        outline: none;
      }
      .leaflet-interactive:focus {
        outline: none;
      }
      .legend {
        background: white;
        padding: 10px 14px;
        border-radius: 6px;
        box-shadow: 0 1px 5px rgba(0, 0, 0, 0.3);
        line-height: 1.6;
        font-size: 13px;
      }
      .legend-gradient {
        width: 160px;
        height: 12px;
        background: linear-gradient(
          to right,
          hsl(120, 80%, 45%),
          hsl(60, 80%, 45%),
          hsl(0, 80%, 45%)
        );
        border-radius: 3px;
        margin: 6px 0 4px;
      }
      .legend-labels {
        display: flex;
        justify-content: space-between;
        font-size: 11px;
        color: #555;
      }
    </style>
  </head>
  <body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="communes.js"></script>
    <script>
      const map = L.map("map").setView([46.603354, 1.888334], 6);

      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        attribution:
          '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
        maxZoom: 19,
      }).addTo(map);

      // Échelle de couleur (percentiles P2/P98)
      const prices = COMMUNES.map((c) => c.avg_m2).sort((a, b) => a - b);
      const p2 = prices[Math.floor(prices.length * 0.02)];
      const p98 = prices[Math.floor(prices.length * 0.98)];

      function priceToColor(price) {
        const t = Math.max(0, Math.min(1, (price - p2) / (p98 - p2)));
        return `hsl(${Math.round(120 * (1 - t))}, 80%, 45%)`;
      }

      // Flag drag pour bloquer les tooltips pendant le déplacement
      let isDragging = false;
      map.on("dragstart", () => {
        isDragging = true;
      });
      map.on("dragend", () => {
        isDragging = false;
      });

      // Index COMMUNES par code_commune
      const communeIndex = {};
      COMMUNES.forEach((c) => {
        communeIndex[c.code_commune] = c;
      });

      // Polygones par commune
      fetch(
        "https://raw.githubusercontent.com/gregoiredavid/france-geojson/master/communes-version-simplifiee.geojson",
      )
        .then((r) => r.json())
        .then((data) => {
          L.geoJSON(data, {
            style(feature) {
              const c = communeIndex[feature.properties.code];
              if (!c)
                return {
                  fillOpacity: 0,
                  color: "#aaa",
                  weight: 0.3,
                  opacity: 0.3,
                };
              return {
                fillColor: priceToColor(c.avg_m2),
                fillOpacity: 0.45,
                color: "#555",
                weight: 0.4,
                opacity: 0.4,
              };
            },
            onEachFeature(feature, layer) {
              const c = communeIndex[feature.properties.code];
              if (!c) return;
              const content =
                `<b>${c.nom_commune}</b> (${c.code_dep})<br>` +
                `${c.avg_m2.toLocaleString("fr-FR")} €/m²<br>` +
                `<small>${c.nb} ventes</small>`;
              let tooltip = null;
              layer.on("mouseover", (e) => {
                if (isDragging) return;
                tooltip = L.tooltip({ sticky: true })
                  .setContent(content)
                  .setLatLng(e.latlng)
                  .addTo(map);
              });
              layer.on("mousemove", (e) => {
                if (!tooltip) return;
                if (isDragging) {
                  tooltip.remove();
                  tooltip = null;
                } else tooltip.setLatLng(e.latlng);
              });
              layer.on("mouseout", () => {
                if (tooltip) {
                  tooltip.remove();
                  tooltip = null;
                }
              });
            },
          }).addTo(map);
        });

      // Légende
      const legend = L.control({ position: "bottomright" });
      legend.onAdd = function () {
        const div = L.DomUtil.create("div", "legend");
        div.innerHTML =
          "<b>Prix moyen au m²</b>" +
          '<div class="legend-gradient"></div>' +
          '<div class="legend-labels">' +
          `<span>${Math.round(p2).toLocaleString("fr-FR")} €</span>` +
          `<span>${Math.round((p2 + p98) / 2).toLocaleString("fr-FR")} €</span>` +
          `<span>${Math.round(p98).toLocaleString("fr-FR")} €</span>` +
          "</div>";
        return div;
      };
      legend.addTo(map);
    </script>
  </body>
</html>

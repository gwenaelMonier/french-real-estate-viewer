<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carte interactive de la France</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: sans-serif;
      }
      #map {
        width: 100vw;
        height: 100vh;
        outline: none;
      }
      .leaflet-interactive:focus {
        outline: none;
      }
      .legend {
        background: white;
        padding: 10px 14px;
        border-radius: 6px;
        box-shadow: 0 1px 5px rgba(0, 0, 0, 0.3);
        line-height: 1.6;
        font-size: 13px;
      }
      .legend-gradient {
        width: 160px;
        height: 12px;
        background: linear-gradient(
          to right,
          hsl(120, 80%, 45%),
          hsl(60, 80%, 45%),
          hsl(0, 80%, 45%)
        );
        border-radius: 3px;
        margin: 6px 0 4px;
      }
      .legend-labels {
        display: flex;
        justify-content: space-between;
        font-size: 11px;
        color: #555;
      }
      .filter-control {
        background: white;
        padding: 8px 12px;
        border-radius: 6px;
        box-shadow: 0 1px 5px rgba(0, 0, 0, 0.3);
        font-size: 13px;
      }
      .filter-control b {
        display: block;
        margin-bottom: 6px;
      }
      .filter-control label {
        display: block;
        cursor: pointer;
        padding: 2px 0;
      }
      .filter-control input {
        margin-right: 5px;
        cursor: pointer;
      }
      .filter-control select {
        width: 100%;
        margin-top: 2px;
        font-size: 13px;
        border: 1px solid #ccc;
        border-radius: 4px;
        padding: 2px 4px;
        cursor: pointer;
      }
      .city-label {
        font-size: 12px;
        font-weight: 600;
        color: #333;
        text-shadow:
          1px 1px 2px white,
          -1px -1px 2px white,
          1px -1px 2px white,
          -1px 1px 2px white;
        white-space: nowrap;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.vectorgrid@1.3.0/dist/Leaflet.VectorGrid.bundled.min.js"></script>
    <script src="communes.js"></script>
    <script>
      const map = L.map("map").setView([46.603354, 1.888334], 6);
      const labelsPane = map.createPane("labelsPane");
      labelsPane.style.zIndex = 650;
      labelsPane.style.overflow = "visible";
      labelsPane.style.pointerEvents = "none";

      // Fond de carte sans labels (les labels sont ajoutés par-dessus les polygones)
      L.tileLayer(
        "https://{s}.basemaps.cartocdn.com/rastertiles/voyager_nolabels/{z}/{x}/{y}{r}.png",
        {
          attribution:
            '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> © <a href="https://carto.com/">CARTO</a>',
          maxZoom: 19,
        },
      ).addTo(map);

      // Filtres actifs
      let activeFilter = "all"; // 'all' | 'maison' | 'appart'
      let activeYear = "all"; // 'all' | '2019' | '2020' | ...

      // Pré-calcul des échelles P3/P97 pour chaque combinaison année × type
      const scales = {};
      for (const year of ["all", ...YEARS.map(String)]) {
        for (const [filterKey, field] of [
          ["all", "avg_m2"],
          ["maison", "avg_m2_maison"],
          ["appart", "avg_m2_appart"],
        ]) {
          const vals = COMMUNES.map((c) => {
            const s = year === "all" ? c : c.years?.[year];
            return s ? s[field] : null;
          })
            .filter((v) => v != null)
            .sort((a, b) => a - b);
          scales[`${year}_${filterKey}`] = {
            p3: vals[Math.floor(vals.length * 0.03)],
            p97: vals[Math.floor(vals.length * 0.97)],
          };
        }
      }

      function getStats(c) {
        if (activeYear === "all") return c;
        return c.years?.[activeYear] ?? null;
      }
      function getPrice(c) {
        const s = getStats(c);
        if (!s) return null;
        if (activeFilter === "all") return s.avg_m2;
        if (activeFilter === "maison") return s.avg_m2_maison;
        return s.avg_m2_appart;
      }
      function getNb(c) {
        const s = getStats(c);
        if (!s) return null;
        if (activeFilter === "all") return s.nb;
        if (activeFilter === "maison") return s.nb_maison;
        return s.nb_appart;
      }

      function priceToColor(price) {
        const { p3, p97 } = scales[`${activeYear}_${activeFilter}`];
        const t = Math.max(0, Math.min(1, (price - p3) / (p97 - p3)));
        return `hsl(${Math.round(120 * (1 - t))}, 80%, 45%)`;
      }

      // Flag drag pour bloquer les tooltips pendant le déplacement
      let isDragging = false;
      function clearTooltip() {
        if (tooltip) {
          tooltip.remove();
          tooltip = null;
        }
      }

      map.on("dragstart", () => {
        isDragging = true;
        clearTooltip();
      });
      map.on("dragend", () => {
        isDragging = false;
      });
      map.on("zoomstart", () => {
        isDragging = true;
        clearTooltip();
      });
      map.on("zoomend", () => {
        isDragging = false;
      });

      // Index COMMUNES par code_commune
      const communeIndex = {};
      COMMUNES.forEach((c) => {
        communeIndex[c.code_commune] = c;
      });

      // Tooltip unique réutilisé
      let tooltip = null;

      // Polygones par commune via VectorGrid (tuiles canvas, seul le visible est rendu)
      let grid = null;
      fetch(
        "https://raw.githubusercontent.com/gregoiredavid/france-geojson/master/communes-version-simplifiee.geojson",
      )
        .then((r) => r.json())
        .then((geojson) => {
          grid = L.vectorGrid
            .slicer(geojson, {
              rendererFactory: L.canvas.tile,
              vectorTileLayerStyles: {
                sliced(properties) {
                  const c = communeIndex[properties.code];
                  if (!c) {
                    return {
                      fill: false,
                      stroke: true,
                      color: "#aaa",
                      weight: 0.3,
                      opacity: 0.2,
                    };
                  }
                  const price = getPrice(c);
                  if (price == null) {
                    return {
                      fill: false,
                      stroke: true,
                      color: "#aaa",
                      weight: 0.3,
                      opacity: 0.2,
                    };
                  }
                  return {
                    fill: true,
                    fillColor: priceToColor(price),
                    fillOpacity: 0.45,
                    stroke: true,
                    color: "#555",
                    weight: 0.4,
                    opacity: 0.3,
                  };
                },
              },
              interactive: true,
              getFeatureId: (f) => f.properties.code,
            })
            .addTo(map);

          grid.on("mouseover", (e) => {
            if (isDragging) return;
            const c = communeIndex[e.layer.properties.code];
            if (!c) return;
            const price = getPrice(c);
            if (price == null) return;
            const nb = getNb(c);
            tooltip = L.tooltip({ sticky: true })
              .setContent(
                `<b>${c.nom_commune}</b> (${c.code_dep})<br>` +
                  `${price.toLocaleString("fr-FR")} €/m²<br>` +
                  `<small>${nb} ventes</small>`,
              )
              .setLatLng(e.latlng)
              .addTo(map);
          });

          map.on("mousemove", (e) => {
            if (!tooltip) return;
            if (isDragging) clearTooltip();
            else tooltip.setLatLng(e.latlng);
          });

          grid.on("mouseout", clearTooltip);

          // Labels de villes (markers textuels, pas de tuiles raster)
          const CITIES = [
            { name: "Paris", lat: 48.8566, lon: 2.3522, minZoom: 5 },
            { name: "Lyon", lat: 45.7578, lon: 4.832, minZoom: 6 },
            { name: "Marseille", lat: 43.2965, lon: 5.3698, minZoom: 6 },
            { name: "Toulouse", lat: 43.6047, lon: 1.4442, minZoom: 6 },
            { name: "Bordeaux", lat: 44.8378, lon: -0.5792, minZoom: 6 },
            { name: "Lille", lat: 50.6292, lon: 3.0573, minZoom: 6 },
            { name: "Nantes", lat: 47.2184, lon: -1.5536, minZoom: 6 },
            { name: "Strasbourg", lat: 48.5734, lon: 7.7521, minZoom: 6 },
            { name: "Nice", lat: 43.7102, lon: 7.262, minZoom: 6 },
            { name: "Rennes", lat: 48.1173, lon: -1.6778, minZoom: 6 },
            { name: "Montpellier", lat: 43.6108, lon: 3.8767, minZoom: 7 },
            { name: "Grenoble", lat: 45.1885, lon: 5.7245, minZoom: 7 },
            { name: "Rouen", lat: 49.4432, lon: 1.0999, minZoom: 7 },
            { name: "Toulon", lat: 43.1242, lon: 5.928, minZoom: 7 },
            { name: "Saint-Étienne", lat: 45.4397, lon: 4.3872, minZoom: 7 },
            { name: "Le Havre", lat: 49.4944, lon: 0.1079, minZoom: 7 },
            { name: "Dijon", lat: 47.322, lon: 5.0415, minZoom: 7 },
            { name: "Angers", lat: 47.4784, lon: -0.5632, minZoom: 7 },
            { name: "Clermont-Ferrand", lat: 45.7772, lon: 3.087, minZoom: 7 },
            { name: "Le Mans", lat: 48.0061, lon: 0.1996, minZoom: 7 },
            { name: "Brest", lat: 48.3904, lon: -4.4861, minZoom: 7 },
            { name: "Tours", lat: 47.3941, lon: 0.6848, minZoom: 7 },
            { name: "Amiens", lat: 49.8941, lon: 2.2958, minZoom: 7 },
            { name: "Limoges", lat: 45.8336, lon: 1.2611, minZoom: 7 },
            { name: "Metz", lat: 49.1193, lon: 6.1757, minZoom: 7 },
            { name: "Perpignan", lat: 42.6887, lon: 2.8948, minZoom: 8 },
            { name: "Besançon", lat: 47.2378, lon: 6.0241, minZoom: 8 },
            { name: "Orléans", lat: 47.9029, lon: 1.9093, minZoom: 8 },
            { name: "Caen", lat: 49.1829, lon: -0.3707, minZoom: 8 },
            { name: "Mulhouse", lat: 47.7508, lon: 7.3359, minZoom: 8 },
            { name: "Nancy", lat: 48.6921, lon: 6.1844, minZoom: 8 },
            { name: "Pau", lat: 43.2951, lon: -0.3708, minZoom: 8 },
            { name: "La Rochelle", lat: 46.1603, lon: -1.1511, minZoom: 8 },
            { name: "Avignon", lat: 43.9493, lon: 4.8055, minZoom: 8 },
            { name: "Cannes", lat: 43.5528, lon: 7.0174, minZoom: 8 },
            { name: "Poitiers", lat: 46.5802, lon: 0.3404, minZoom: 8 },
            { name: "Valence", lat: 44.9334, lon: 4.8924, minZoom: 8 },
            { name: "Troyes", lat: 48.2973, lon: 4.0744, minZoom: 8 },
            { name: "Chambéry", lat: 45.5646, lon: 5.9178, minZoom: 8 },
            { name: "Nîmes", lat: 43.8367, lon: 4.3601, minZoom: 8 },
            { name: "Dunkerque", lat: 51.0343, lon: 2.3768, minZoom: 8 },
            { name: "Bayonne", lat: 43.4929, lon: -1.4748, minZoom: 8 },
          ];

          const cityMarkers = [];
          const cityLabels = L.layerGroup().addTo(map);
          CITIES.forEach((city) => {
            const marker = L.marker([city.lat, city.lon], {
              icon: L.divIcon({
                className: "city-label",
                html: city.name,
                iconSize: null,
              }),
              interactive: false,
              pane: "shadowPane",
            });
            marker._cityMinZoom = city.minZoom;
            cityMarkers.push(marker);
          });

          function updateCityLabels() {
            const zoom = map.getZoom();
            cityMarkers.forEach((marker) => {
              if (zoom >= marker._cityMinZoom && zoom < 10) {
                if (!cityLabels.hasLayer(marker)) cityLabels.addLayer(marker);
              } else {
                if (cityLabels.hasLayer(marker)) cityLabels.removeLayer(marker);
              }
            });
          }
          updateCityLabels();
          map.on("zoomend", updateCityLabels);
        });

      // Tuiles CartoDB labels pour les noms de villages/communes au zoom élevé
      L.tileLayer(
        "https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png",
        {
          minZoom: 10,
          maxZoom: 19,
          pane: "labelsPane",
        },
      ).addTo(map);

      // Légende dynamique
      let legendDiv = null;
      function updateLegend() {
        if (!legendDiv) return;
        const { p3, p97 } = scales[`${activeYear}_${activeFilter}`];
        legendDiv.innerHTML =
          "<b>Prix moyen au m²</b>" +
          '<div class="legend-gradient"></div>' +
          '<div class="legend-labels">' +
          `<span>${Math.round(p3).toLocaleString("fr-FR")} €</span>` +
          `<span>${Math.round((p3 + p97) / 2).toLocaleString("fr-FR")} €</span>` +
          `<span>${Math.round(p97).toLocaleString("fr-FR")} €</span>` +
          "</div>";
      }

      const legend = L.control({ position: "bottomright" });
      legend.onAdd = function () {
        legendDiv = L.DomUtil.create("div", "legend");
        updateLegend();
        return legendDiv;
      };
      legend.addTo(map);

      // Encart filtre
      const filterControl = L.control({ position: "topright" });
      filterControl.onAdd = function () {
        const div = L.DomUtil.create("div", "filter-control");
        L.DomEvent.disableClickPropagation(div);
        div.innerHTML =
          "<b>Type de bien</b>" +
          ["all", "maison", "appart"]
            .map((v) => {
              const label =
                v === "all"
                  ? "Tous"
                  : v === "maison"
                    ? "Maison"
                    : "Appartement";
              const checked = v === "all" ? "checked" : "";
              return `<label><input type="radio" name="filter" value="${v}" ${checked}>${label}</label>`;
            })
            .join("") +
          '<b style="display:block;margin-top:8px;margin-bottom:6px;">Année</b>' +
          '<select name="year">' +
          '<option value="all">Toutes</option>' +
          YEARS.map((y) => `<option value="${y}">${y}</option>`).join("") +
          "</select>";
        div.addEventListener("change", (e) => {
          if (e.target.name === "filter") activeFilter = e.target.value;
          if (e.target.name === "year") activeYear = e.target.value;
          clearTooltip();
          if (grid) grid.redraw();
          updateLegend();
        });
        return div;
      };
      filterControl.addTo(map);
    </script>
  </body>
</html>

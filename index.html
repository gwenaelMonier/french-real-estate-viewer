<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carte interactive de la France</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: sans-serif;
      }
      #map {
        width: 100vw;
        height: 100vh;
        outline: none;
      }
      .legend {
        background: white;
        padding: 10px 14px;
        border-radius: 6px;
        box-shadow: 0 1px 5px rgba(0, 0, 0, 0.3);
        line-height: 1.6;
        font-size: 13px;
      }
      .legend-gradient {
        width: 160px;
        height: 12px;
        background: linear-gradient(
          to right,
          hsl(120, 80%, 45%),
          hsl(60, 80%, 45%),
          hsl(0, 80%, 45%)
        );
        border-radius: 3px;
        margin: 6px 0 4px;
      }
      .legend-gradient-evol {
        background: linear-gradient(to right, hsl(120,80%,45%), hsl(60,80%,45%), hsl(0,80%,45%));
      }
      .legend-labels {
        display: flex;
        justify-content: space-between;
        font-size: 11px;
        color: #555;
      }
      .filter-control {
        background: white;
        padding: 8px 12px;
        border-radius: 6px;
        box-shadow: 0 1px 5px rgba(0, 0, 0, 0.3);
        font-size: 13px;
      }
      .filter-control b {
        display: block;
        margin-bottom: 6px;
      }
      .filter-control label {
        display: block;
        cursor: pointer;
        padding: 2px 0;
      }
      .filter-control input {
        margin-right: 5px;
        cursor: pointer;
      }
      .filter-control select {
        width: 100%;
        margin-top: 2px;
        font-size: 13px;
        border: 1px solid #ccc;
        border-radius: 4px;
        padding: 2px 4px;
        cursor: pointer;
      }
      .filter-control small {
        display: block;
        color: #666;
        margin-top: 2px;
      }
      .maplibregl-popup-content {
        font-family: sans-serif;
        font-size: 13px;
        padding: 8px 10px;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <div id="map"></div>

    <div id="legend" class="legend" style="position:absolute;bottom:36px;right:10px;z-index:1;"></div>
    <div id="filter-control" class="filter-control" style="position:absolute;top:10px;right:10px;z-index:1;"></div>

    <script src="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.js"></script>
    <script src="communes.js"></script>
    <script>
      const map = new maplibregl.Map({
        container: 'map',
        style: 'https://basemaps.cartocdn.com/gl/voyager-gl-style/style.json',
        center: [1.888334, 46.603354],
        zoom: 6,
      });

      // Filtres actifs
      let activeFilter = "all"; // 'all' | 'maison' | 'appart'
      let activeYear = "all";   // 'all' | '2019' | '2020' | ...
      let activeMode = 'prix';  // 'prix' | 'evolution'
      let activeCalc = 'moyenne'; // 'moyenne' | 'mediane'
      const LATEST_YEAR = String(Math.max(...YEARS));
      let baseYear = String(YEARS[0]);

      // Pré-calcul des échelles P3/P97 pour chaque combinaison calc × année × type
      const scales = {};
      for (const calc of ['moyenne', 'mediane']) {
        for (const year of ["all", ...YEARS.map(String)]) {
          for (const [filterKey, avgField, medField] of [
            ["all", "avg_m2", "med_m2"],
            ["maison", "avg_m2_maison", "med_m2_maison"],
            ["appart", "avg_m2_appart", "med_m2_appart"],
          ]) {
            const field = calc === 'mediane' ? medField : avgField;
            const vals = COMMUNES.map((c) => {
              const s = year === "all" ? c : c.years?.[year];
              return s ? s[field] : null;
            })
              .filter((v) => v != null)
              .sort((a, b) => a - b);
            scales[`${year}_${filterKey}_${calc}`] = {
              p3: vals[Math.floor(vals.length * 0.03)],
              p97: vals[Math.floor(vals.length * 0.97)],
            };
          }
        }
      }

      // Pré-calcul des échelles d'évolution (pour chaque calc × filtre × baseYear)
      const evolutionScales = {};
      for (const [filterKey, avgField, medField] of [
        ['all', 'avg_m2', 'med_m2'],
        ['maison', 'avg_m2_maison', 'med_m2_maison'],
        ['appart', 'avg_m2_appart', 'med_m2_appart'],
      ]) {
        for (const calc of ['moyenne', 'mediane']) {
          const field = calc === 'mediane' ? medField : avgField;
          for (const baseYr of YEARS.slice(0, -1).map(String)) {
            const evols = COMMUNES.map(c => {
              const base = c.years?.[baseYr]?.[field];
              const latest = c.years?.[LATEST_YEAR]?.[field];
              if (!base || !latest) return null;
              return (latest - base) / base * 100;
            }).filter(v => v != null).sort((a, b) => a - b);
            evolutionScales[`${baseYr}_${filterKey}_${calc}`] = {
              p3: evols[Math.floor(evols.length * 0.03)],
              p97: evols[Math.floor(evols.length * 0.97)],
            };
          }
        }
      }

      function getStats(c) {
        if (activeYear === "all") return c;
        return c.years?.[activeYear] ?? null;
      }
      function priceField() {
        const prefix = activeCalc === 'mediane' ? 'med' : 'avg';
        if (activeFilter === 'all') return `${prefix}_m2`;
        if (activeFilter === 'maison') return `${prefix}_m2_maison`;
        return `${prefix}_m2_appart`;
      }

      function getPrice(c) {
        const s = getStats(c);
        if (!s) return null;
        return s[priceField()] ?? null;
      }
      function getNb(c) {
        const s = getStats(c);
        if (!s) return null;
        if (activeFilter === "all") return s.nb;
        if (activeFilter === "maison") return s.nb_maison;
        return s.nb_appart;
      }

      function priceToColor(price) {
        const { p3, p97 } = scales[`${activeYear}_${activeFilter}_${activeCalc}`];
        const t = Math.max(0, Math.min(1, (price - p3) / (p97 - p3)));
        return `hsl(${Math.round(120 * (1 - t))}, 80%, 45%)`;
      }

      function getEvolution(c) {
        const field = priceField();
        const base = c.years?.[baseYear]?.[field];
        const latest = c.years?.[LATEST_YEAR]?.[field];
        if (!base || !latest) return null;
        return (latest - base) / base * 100;
      }

      function evolutionToColor(pct) {
        const { p3, p97 } = evolutionScales[`${baseYear}_${activeFilter}_${activeCalc}`];
        const range = Math.max(Math.abs(p3), Math.abs(p97));
        const t = Math.max(0, Math.min(1, (pct + range) / (2 * range)));
        return `hsl(${Math.round(120 * (1 - t))}, 80%, 45%)`;
      }

      // Index COMMUNES par code_commune
      const communeIndex = {};
      COMMUNES.forEach((c) => {
        communeIndex[c.code_commune] = c;
      });

      // Cache GeoJSON enrichi
      let geojsonCache = null;

      function enrichGeoJSON(geojson) {
        geojson.features.forEach((f) => {
          const code = String(f.properties.code);
          const c = communeIndex[code];
          f.properties.nomCommune = c?.nom_commune ?? f.properties.nom ?? '';
          f.properties.codeDep = c?.code_dep ?? '';

          if (activeMode === 'prix') {
            const price = c ? getPrice(c) : null;
            f.properties.fillColor = price != null ? priceToColor(price) : '';
            f.properties.price = price != null ? price : -1;
            f.properties.nb = (c ? getNb(c) : null) ?? 0;
            f.properties.evol = -999;
          } else {
            const evol = c ? getEvolution(c) : null;
            f.properties.fillColor = evol != null ? evolutionToColor(evol) : '';
            f.properties.evol = evol != null ? evol : -999;
            const field = priceField();
            f.properties.priceBase = c?.years?.[baseYear]?.[field] ?? -1;
            f.properties.priceLatest = c?.years?.[LATEST_YEAR]?.[field] ?? -1;
            f.properties.price = -1;
            f.properties.nb = 0;
          }
        });
        return geojson;
      }

      function getFirstLabelLayerId() {
        return map.getStyle().layers.find(l => l.type === 'symbol')?.id;
      }

      function redrawCommunes() {
        if (!map.getSource('communes')) return;
        enrichGeoJSON(geojsonCache);
        map.getSource('communes').setData(geojsonCache);
      }

      // Légende dynamique
      const legendDiv = document.getElementById('legend');
      function updateLegend() {
        if (activeMode === 'prix') {
          const { p3, p97 } = scales[`${activeYear}_${activeFilter}_${activeCalc}`];
          legendDiv.innerHTML =
            "<b>Prix moyen au m²</b>" +
            '<div class="legend-gradient"></div>' +
            '<div class="legend-labels">' +
            `<span>${Math.round(p3).toLocaleString("fr-FR")} €</span>` +
            `<span>${Math.round((p3 + p97) / 2).toLocaleString("fr-FR")} €</span>` +
            `<span>${Math.round(p97).toLocaleString("fr-FR")} €</span>` +
            "</div>";
        } else {
          const { p3, p97 } = evolutionScales[`${baseYear}_${activeFilter}_${activeCalc}`];
          const range = Math.max(Math.abs(p3), Math.abs(p97));
          legendDiv.innerHTML =
            `<b>Évolution ${baseYear}→${LATEST_YEAR}</b>` +
            '<div class="legend-gradient legend-gradient-evol"></div>' +
            '<div class="legend-labels">' +
            `<span>${(-range).toFixed(0)}%</span><span>0%</span><span>+${range.toFixed(0)}%</span>` +
            '</div>';
        }
      }
      updateLegend();

      // Encart filtre
      const filterDiv = document.getElementById('filter-control');

      function renderFilterPanel() {
        filterDiv.innerHTML =
          '<b>Mode de calcul</b>' +
          '<select name="calc">' +
          `<option value="moyenne"${activeCalc === 'moyenne' ? ' selected' : ''}>Moyenne</option>` +
          `<option value="mediane"${activeCalc === 'mediane' ? ' selected' : ''}>Médiane</option>` +
          '</select>' +
          '<b style="display:block;margin-top:8px;margin-bottom:6px;">Mode</b>' +
          '<label><input type="radio" name="mode" value="prix" ' + (activeMode === 'prix' ? 'checked' : '') + '> Prix moyen</label>' +
          '<label><input type="radio" name="mode" value="evolution" ' + (activeMode === 'evolution' ? 'checked' : '') + '> Évolution</label>' +
          '<b style="display:block;margin-top:8px;margin-bottom:6px;">Type de bien</b>' +
          ["all", "maison", "appart"]
            .map((v) => {
              const label = v === "all" ? "Tous" : v === "maison" ? "Maison" : "Appartement";
              const checked = v === activeFilter ? "checked" : "";
              return `<label><input type="radio" name="filter" value="${v}" ${checked}>${label}</label>`;
            })
            .join("") +
          (activeMode === 'prix'
            ? '<b style="display:block;margin-top:8px;margin-bottom:6px;">Année</b>' +
              '<select name="year">' +
              '<option value="all"' + (activeYear === 'all' ? ' selected' : '') + '>Toutes</option>' +
              YEARS.map((y) => `<option value="${y}"${String(y) === activeYear ? ' selected' : ''}>${y}</option>`).join("") +
              '</select>'
            : '<b style="display:block;margin-top:8px;margin-bottom:6px;">Depuis</b>' +
              '<select name="baseYear">' +
              YEARS.slice(0, -1).map(y => `<option value="${y}"${String(y) === baseYear ? ' selected' : ''}>${y}</option>`).join('') +
              '</select>' +
              `<small>jusqu'en ${LATEST_YEAR}</small>`
          );
      }

      renderFilterPanel();

      filterDiv.addEventListener("change", (e) => {
        if (e.target.name === "calc") activeCalc = e.target.value;
        if (e.target.name === "mode") { activeMode = e.target.value; renderFilterPanel(); }
        if (e.target.name === "filter") activeFilter = e.target.value;
        if (e.target.name === "year") activeYear = e.target.value;
        if (e.target.name === "baseYear") baseYear = e.target.value;
        popup.remove();
        redrawCommunes();
        updateLegend();
      });

      // Popup réutilisée
      const popup = new maplibregl.Popup({ closeButton: false, closeOnClick: false, offset: 10 });

      map.on('load', () => {
        fetch(
          "https://raw.githubusercontent.com/gregoiredavid/france-geojson/master/communes-version-simplifiee.geojson",
        )
          .then((r) => r.json())
          .then((geojson) => {
            geojsonCache = enrichGeoJSON(geojson);
            const labelLayerId = getFirstLabelLayerId();

            map.addSource('communes', { type: 'geojson', data: geojsonCache });

            map.addLayer({
              id: 'communes-fill',
              type: 'fill',
              source: 'communes',
              paint: {
                'fill-color': ['case', ['!=', ['get', 'fillColor'], ''], ['get', 'fillColor'], 'rgba(0,0,0,0)'],
                'fill-opacity': 0.45,
              },
            }, labelLayerId);

            map.addLayer({
              id: 'communes-line',
              type: 'line',
              source: 'communes',
              paint: {
                'line-color': '#888',
                'line-width': 0.3,
                'line-opacity': 0.15,
              },
            }, labelLayerId);

            map.on('mousemove', 'communes-fill', (e) => {
              const p = e.features[0].properties;
              if (!p.nomCommune) return;
              map.getCanvas().style.cursor = 'pointer';
              const html = activeMode === 'evolution' && p.evol > -999
                ? `<b>${p.nomCommune}</b> (${p.codeDep})<br>`
                  + `${p.evol >= 0 ? '+' : ''}${Number(p.evol).toFixed(1)}%`
                  + ` (${baseYear}→${LATEST_YEAR})<br>`
                  + `<small>${Number(p.priceBase).toLocaleString('fr-FR')} → `
                  + `${Number(p.priceLatest).toLocaleString('fr-FR')} €/m²</small>`
                : activeMode === 'prix' && p.price >= 0
                ? `<b>${p.nomCommune}</b> (${p.codeDep})<br>${Number(p.price).toLocaleString('fr-FR')} €/m²<br><small>${p.nb} ventes</small>`
                : `<b>${p.nomCommune}</b><br><small style="color:#999">Aucune donnée</small>`;
              popup.setLngLat(e.lngLat).setHTML(html).addTo(map);
            });

            map.on('mouseleave', 'communes-fill', () => {
              map.getCanvas().style.cursor = '';
              popup.remove();
            });
          });
      });
    </script>
  </body>
</html>
